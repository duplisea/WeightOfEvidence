<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TVRP Productivity Shift Evaluation Tool</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f3f4f6;color:#111827;font-size:14px}

header{background:#1e40af;color:white;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
header h1{font-size:18px;font-weight:700}
header p{font-size:12px;color:#bfdbfe;margin-top:2px}
.header-btns{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.btn-white{background:white;color:#1e40af}.btn-white:hover{background:#eff6ff}
.btn-blue{background:#2563eb;color:white}.btn-blue:hover{background:#1d4ed8}

nav{display:flex;background:white;border-bottom:1px solid #e5e7eb;overflow-x:auto;padding:0 16px}

nav button{padding:12px 16px;font-size:13px;font-weight:500;border:none;border-bottom:2px solid transparent;background:none;cursor:pointer;white-space:nowrap;color:#6b7280}
nav button.active{border-bottom-color:#2563eb;color:#2563eb}

.container{max-width:920px;margin:0 auto;padding:24px 16px}
.card{background:white;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:22px;margin-bottom:20px}

.card h3{font-size:15px;font-weight:600;margin-bottom:14px;color:#1e293b}
@media(prefers-color-scheme:dark){.card h3{color:#f1f5f9}}
h2{font-size:17px;font-weight:700;margin-bottom:4px;color:#1e293b}
@media(prefers-color-scheme:dark){h2{color:#f1f5f9}}
.sub{font-size:13px;color:#6b7280;margin-bottom:20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

.field{display:flex;flex-direction:column;gap:4px}
label{font-size:12px;font-weight:500;color:#4b5563}

@media(prefers-color-scheme:dark){input[type=text],input[type=number],select,textarea{background:#0f172a;border-color:#475569;color:#f1f5f9}}

.checkgroup{display:flex;flex-direction:column;gap:8px}
.checkgroup label{font-size:13px;color:#374151;display:flex;align-items:flex-start;gap:8px;font-weight:400;cursor:pointer}

.checkgroup input{margin-top:2px;flex-shrink:0}
.alert{border-radius:8px;padding:12px 16px;font-size:13px;border:1px solid;margin-bottom:12px}
.alert-blue{background:#eff6ff;border-color:#93c5fd;color:#1e40af}
.alert-amber{background:#fffbeb;border-color:#fcd34d;color:#92400e}
.alert-red{background:#fef2f2;border-color:#fca5a5;color:#991b1b}
.alert-green{background:#f0fdf4;border-color:#86efac;color:#166534}
.alert-purple{background:#faf5ff;border-color:#c4b5fd;color:#5b21b6}
@media(prefers-color-scheme:dark){
.alert-blue{background:#1e3a5f;border-color:#3b82f6;color:#bfdbfe}
.alert-amber{background:#422006;border-color:#d97706;color:#fde68a}
.alert-red{background:#450a0a;border-color:#ef4444;color:#fecaca}
.alert-green{background:#052e16;border-color:#22c55e;color:#bbf7d0}
.alert-purple{background:#2e1065;border-color:#a855f7;color:#e9d5ff}}
.ev-line{border:1px solid #e5e7eb;border-radius:8px;padding:14px;margin-bottom:10px;background:#f9fafb}
.ev-line.state-scored{border-color:#93c5fd;background:#eff6ff}
.ev-line.state-na{border-color:#d1d5db;background:#f3f4f6;opacity:0.6}
.ev-line.state-ikfk{border-color:#c4b5fd;background:#faf5ff}
@media(prefers-color-scheme:dark){
.ev-line{background:#0f172a;border-color:#334155}
.ev-line.state-scored{background:#1e3a5f;border-color:#3b82f6}
.ev-line.state-na{background:#1e293b;border-color:#334155;opacity:0.6}
.ev-line.state-ikfk{background:#2e1065;border-color:#a855f7}}
.ev-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.ev-label{font-weight:600;font-size:13px;color:#1e293b}
@media(prefers-color-scheme:dark){.ev-label{color:#f1f5f9}}
.ev-sub{font-size:11px;color:#9ca3af;font-style:italic;margin-left:4px}
.ev-weighted{font-size:11px;font-family:monospace;margin-left:auto;background:#dbeafe;color:#1e40af;padding:3px 8px;border-radius:6px;white-space:nowrap}
.ev-weighted-ikfk{background:#ede9fe;color:#5b21b6}
.ev-status-btns{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.ev-status-btn{padding:4px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid transparent}
.ev-btn-assess{background:#dbeafe;color:#1e40af;border-color:#93c5fd}
.ev-btn-assess.active{background:#2563eb;color:white;border-color:#2563eb}
.ev-btn-na{background:#f3f4f6;color:#6b7280;border-color:#d1d5db}
.ev-btn-na.active{background:#6b7280;color:white;border-color:#6b7280}
.ev-btn-ikfk{background:#ede9fe;color:#5b21b6;border-color:#c4b5fd}
.ev-btn-ikfk.active{background:#7c3aed;color:white;border-color:#7c3aed}
@media(prefers-color-scheme:dark){
.ev-btn-assess{background:#1e3a5f;color:#bfdbfe;border-color:#3b82f6}
.ev-btn-assess.active{background:#2563eb;color:white}
.ev-btn-na{background:#1e293b;color:#94a3b8;border-color:#334155}
.ev-btn-na.active{background:#475569;color:white}}
.ev-fields{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
@media(max-width:700px){.ev-fields{grid-template-columns:1fr 1fr}}
@media(max-width:450px){.ev-fields{grid-column:1fr}}
.ev-fields .span2{grid-column:span 2}
.ev-fields .span3{grid-column:span 3}
.ipcc-derived-box{background:#f0f9ff;border:1px solid #bae6fd;border-radius:6px;padding:8px 10px;font-size:12px;color:#1e40af;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
@media(prefers-color-scheme:dark){.ipcc-derived-box{background:#0c4a6e;border-color:#0284c7;color:#bfdbfe}}
.nav-btns{display:flex;justify-content:space-between;margin-top:24px}
.gate-card{border-radius:12px;border:2px solid #e5e7eb;padding:20px;margin-bottom:20px;background:white}
@media(prefers-color-scheme:dark){.gate-card{background:#1e293b}}
.gate-card.pass{border-color:#4ade80}.gate-card.flag{border-color:#fbbf24}.gate-card.stop{border-color:#f87171}.gate-card.pending{border-color:#9ca3af}
.gate-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.gate-title{font-weight:600;font-size:14px;color:#1e293b}
@media(prefers-color-scheme:dark){.gate-title{color:#f1f5f9}}
.badge{font-size:11px;font-weight:700;padding:4px 12px;border-radius:999px}
.badge-pass{background:#dcfce7;color:#166534}.badge-flag{background:#fef3c7;color:#92400e}
.badge-stop{background:#fee2e2;color:#991b1b}.badge-pending{background:#f3f4f6;color:#6b7280}
@media(prefers-color-scheme:dark){
.badge-pass{background:#14532d;color:#bbf7d0}.badge-flag{background:#422006;color:#fde68a}
.badge-stop{background:#450a0a;color:#fecaca}.badge-pending{background:#1e293b;color:#94a3b8}}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f3f4f6;text-align:left;padding:6px 8px;border:1px solid #e5e7eb;color:#374151;white-space:nowrap}
td{padding:5px 8px;border:1px solid #e5e7eb;color:#374151}
tr:nth-child(even) td{background:#f9fafb}
@media(prefers-color-scheme:dark){
th{background:#1e293b;border-color:#334155;color:#cbd5e1}
td{border-color:#334155;color:#cbd5e1}
tr:nth-child(even) td{background:#0f172a}}
.td-blue{color:#2563eb;font-family:monospace}.td-green{color:#16a34a;font-family:monospace}
.td-purple{color:#7c3aed;font-family:monospace}
.td-pos{color:#16a34a;font-family:monospace}.td-neg{color:#dc2626;font-family:monospace}
.finding-block{border-left:3px solid #93c5fd;padding:10px 14px;margin-bottom:10px;background:#f8faff;border-radius:0 6px 6px 0}
@media(prefers-color-scheme:dark){.finding-block{background:#1e3a5f;border-color:#3b82f6}}
.finding-auto{font-size:12px;color:#374151;font-style:italic;margin-bottom:6px}
@media(prefers-color-scheme:dark){.finding-auto{color:#94a3b8}}
.finding-label{font-size:11px;font-weight:600;color:#6b7280;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.ipcc-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;margin-left:4px}
.ipcc-very-high{background:#dcfce7;color:#166534}.ipcc-high{background:#d1fae5;color:#065f46}
.ipcc-medium{background:#fef3c7;color:#92400e}.ipcc-low{background:#fee2e2;color:#991b1b}
.ipcc-very-low{background:#f3f4f6;color:#6b7280}
@media(prefers-color-scheme:dark){
.ipcc-very-high{background:#14532d;color:#bbf7d0}.ipcc-high{background:#064e3b;color:#a7f3d0}
.ipcc-medium{background:#422006;color:#fde68a}.ipcc-low{background:#450a0a;color:#fecaca}
.ipcc-very-low{background:#1e293b;color:#94a3b8}}
.valence-good{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;background:#dcfce7;color:#166534;margin-left:4px}
.valence-bad{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;background:#fee2e2;color:#991b1b;margin-left:4px}
.valence-neutral{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;background:#f3f4f6;color:#6b7280;margin-left:4px}
@media(prefers-color-scheme:dark){
.valence-good{background:#14532d;color:#bbf7d0}
.valence-bad{background:#450a0a;color:#fecaca}
.valence-neutral{background:#1e293b;color:#94a3b8}}
.dir-valence-live{font-size:11px;margin-top:4px;padding:3px 8px;border-radius:4px;display:inline-block}
.line-status-badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;margin-left:4px}
.lsb-scored{background:#dbeafe;color:#1e40af}
.lsb-na{background:#f3f4f6;color:#6b7280}
.lsb-unassessed{background:#fef3c7;color:#92400e}
@media(prefers-color-scheme:dark){
.lsb-scored{background:#1e3a5f;color:#bfdbfe}
.lsb-na{background:#1e293b;color:#94a3b8}
.lsb-unassessed{background:#422006;color:#fde68a}}
.gap-domain-section{margin-bottom:14px}
.gap-domain-title{font-size:12px;font-weight:700;color:#374151;margin-bottom:6px;padding:4px 8px;background:#f3f4f6;border-radius:4px}
@media(prefers-color-scheme:dark){.gap-domain-title{background:#1e293b;color:#cbd5e1}}
.gap-item{font-size:12px;padding:3px 6px;display:flex;align-items:baseline;gap:6px}
.gap-item-critical{color:#991b1b}
.gap-item-normal{color:#374151}
.gap-item-na{color:#6b7280}
@media(prefers-color-scheme:dark){.gap-item-critical{color:#fca5a5}.gap-item-normal{color:#cbd5e1}.gap-item-na{color:#94a3b8}}
.gap-assessed{font-size:11px;color:#9ca3af;font-style:italic;padding:3px 6px}
.synthesis-block{background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:16px;margin-bottom:12px}
@media(prefers-color-scheme:dark){.synthesis-block{background:#0c4a6e;border-color:#0284c7}}
.domain-contrib{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
.contrib-cell{text-align:center;padding:10px;background:#f9fafb;border-radius:8px;border:1px solid #e5e7eb}
@media(prefers-color-scheme:dark){.contrib-cell{background:#0f172a;border-color:#334155}}
.contrib-pct{font-size:22px;font-weight:700;color:#2563eb}
.contrib-label{font-size:11px;color:#6b7280;margin-top:2px}
.section-note{font-size:12px;color:#6b7280;margin-bottom:14px}
.import-msg{font-size:12px;margin-top:8px}
.import-ok{color:#86efac}.import-err{color:#fca5a5}
.sensitivity-summary{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:14px;margin-top:10px}
@media(prefers-color-scheme:dark){.sensitivity-summary{background:#0f172a;border-color:#334155}}
.sens-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #f3f4f6;font-size:12px}
@media(prefers-color-scheme:dark){.sens-row{border-color:#1e293b}}
.sens-row:last-child{border-bottom:none}
.disclaimer{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:16px;margin-top:8px;font-size:12px;color:#4b5563;line-height:1.6}
@media(prefers-color-scheme:dark){.disclaimer{background:#1e293b;border-color:#334155;color:#94a3b8}}
.intro-domain-card{border-radius:10px;padding:18px;margin-bottom:14px;border:1px solid}
.intro-domain-a{background:#eff6ff;border-color:#93c5fd}
.intro-domain-b{background:#f0fdf4;border-color:#86efac}
.intro-domain-c{background:#faf5ff;border-color:#c4b5fd}
@media(prefers-color-scheme:dark){
.intro-domain-a{background:#1e3a5f;border-color:#3b82f6}
.intro-domain-b{background:#052e16;border-color:#22c55e}
.intro-domain-c{background:#2e1065;border-color:#a855f7}}
.intro-domain-title{font-size:14px;font-weight:700;margin-bottom:6px}
.intro-domain-a .intro-domain-title{color:#1e40af}
.intro-domain-b .intro-domain-title{color:#166534}
.intro-domain-c .intro-domain-title{color:#5b21b6}
@media(prefers-color-scheme:dark){
.intro-domain-a .intro-domain-title{color:#bfdbfe}
.intro-domain-b .intro-domain-title{color:#bbf7d0}
.intro-domain-c .intro-domain-title{color:#e9d5ff}}
/* Formula box: styled equation display */
.formula-box{background:#1e293b;color:#e2e8f0;border-radius:10px;padding:18px 22px;margin:12px 0;overflow-x:auto}
.formula-section{margin-bottom:14px}
.formula-section:last-child{margin-bottom:0}
.formula-section-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#94a3b8;margin-bottom:8px}
.formula-eq{display:flex;align-items:center;flex-wrap:wrap;gap:6px;font-family:monospace;font-size:13px;line-height:1.5}
.formula-lhs{color:#93c5fd;font-weight:700}
.formula-eq-sign{color:#94a3b8;font-size:15px}
.formula-rhs{color:#e2e8f0}
.formula-prod{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,0.06);border-radius:6px;padding:3px 8px}
.formula-times{color:#a78bfa;font-size:14px;font-weight:700}
.formula-table{width:100%;border-collapse:collapse;margin-top:4px;font-size:12px;font-family:monospace}
.formula-table td{padding:3px 8px;border:none;color:#e2e8f0}
.formula-table td:first-child{color:#fbbf24;white-space:nowrap;width:220px}
.formula-table td:last-child{color:#d1d5db}
.formula-divider{border:none;border-top:1px solid rgba(255,255,255,0.1);margin:12px 0}
.formula-pct-box{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.08);border-radius:8px;padding:8px 14px}
.formula-fraction{display:inline-flex;flex-direction:column;align-items:center;font-family:monospace;font-size:12px;line-height:1.4}
.formula-fraction-num{color:#86efac;padding-bottom:2px;border-bottom:1px solid #94a3b8}
.formula-fraction-den{color:#fca5a5;padding-top:2px}
.formula-x100{color:#a78bfa;font-size:13px;font-weight:700;margin-left:4px}
/* ------ */
.checklist-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #e5e7eb;font-size:13px}
@media(prefers-color-scheme:dark){.checklist-item{border-color:#334155}}
.checklist-item:last-child{border-bottom:none}
.checklist-num{width:22px;height:22px;border-radius:50%;background:#2563eb;color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.refcase-panel{background:#f8faff;border:1px solid #bfdbfe;border-radius:10px;padding:16px;margin-top:18px}

.refcase-title{font-size:13px;font-weight:700;color:#1e40af;margin-bottom:10px}
@media(prefers-color-scheme:dark){.refcase-title{color:#bfdbfe}}
.refcase-cases{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}

.refcase-case{border-radius:8px;padding:12px;border:1px solid}

.refcase-case-low{border-color:#d1d5db;background:#f9fafb}
@media(prefers-color-scheme:dark){
.refcase-case-cod{border-color:#ef4444;background:#450a0a}
.refcase-case-low{border-color:#334155;background:#0f172a}}
.refcase-case-title{font-size:12px;font-weight:700;margin-bottom:4px}
.refcase-case-cod .refcase-case-title{color:#991b1b}
.refcase-case-low .refcase-case-title{color:#374151}

.refcase-case-cod .refcase-case-title{color:#fca5a5}

<body>
<header>
  <div>
    <h1>Productivity Shift Evaluation Tool - Weight of Evidence Calculator</h1>
    <p>Time-Varying Reference Point Assessment Framework. Fisheries and Oceans Canada</p>
  </div>
  <div class="header-btns">
    <input type="file" id="importFile" accept=".csv" style="display:none">

    <button class="btn btn-blue" id="exportBtn">&#8595; Export CSV</button>

];
var DOMAIN_C = [

];

var WHY_OPTS=["Failed recovery despite reduced fishing pressure","Persistent retrospective pattern in stock assessment","Changed growth (weight-at-age or length-at-age)","Changed maturity schedule","Persistent recruitment failure","Observed changes in natural mortality","Ecosystem/environmental changes in the area","Indigenous or fisher knowledge indicating change","Other (describe in notes)"];
var DRIVER_OPTS=["Scientific assessment process (internal DFO)","Independent peer review recommendation","Management request to resolve stock status classification","Indigenous rights holder request","Industry request to maintain or expand fishing access","Other"];

var REF_CASES = {
  cod:{pct:72,label:"Northern Cod (2J3KL) \u2014 Strong case",

function initLine(line){
  return {
    state:"unassessed",
    score:0, quality:0.83, agreement:1.0,
    importance: line.imp!==null?line.imp:0.5,
    onset_year:"", direction:"Decline", ongoing:"true",
    notes:"", contradicts:"false", finding_text:""
  };
}

var S = {
  stockName:"", generationTime:"", assessmentType:"survey-index",
  whyConsidering:[], fishingPressureExplains:"uncertain",
  domainA:{}, domainB:{}, ikfk:{},
  wtA:1.0, wtB:1.0, wtC:1.0,
  ikConsultation:"not_sought", fkConsultation:"not_sought", ikfkDisagreementNotes:"",
  reversible:"uncertain", reversibleNotes:"", previousCollapse:"unknown",
  lifeHistoryChanges:"unknown", lifeHistoryNotes:"",
  fReduced:"no", fReductionMagnitude:"", fReductionDuration:"", fReductionNotes:"",
  primaryDriver:[], industryPressureDetails:"",
  mgmtPrecision:"", rpChangeMagnitude:"", hcrExists:"no",
  domainASynthesis:"", domainBSynthesis:"", ikfkSynthesis:"", overallSynthesis:""
};

function resetDomains(){
  S.domainA={}; S.domainB={}; S.ikfk={};
  DOMAIN_A.forEach(function(l){S.domainA[l.id]=initLine(l);});
  DOMAIN_B.forEach(function(l){S.domainB[l.id]=initLine(l);});
  DOMAIN_C.forEach(function(l){S.ikfk[l.id]=initLine(l);});
}
resetDomains();

var IPCC_GRID={
  "Limited,Low":{level:"Very Low",weight:0.25},
  "Limited,Medium":{level:"Low",weight:0.25},
  "Limited,High":{level:"Low",weight:0.25},
  "Medium,Low":{level:"Low",weight:0.25},
  "Medium,Medium":{level:"Medium",weight:0.5},
  "Medium,High":{level:"Medium",weight:0.5},
  "Robust,Low":{level:"Medium",weight:0.5},
  "Robust,Medium":{level:"High",weight:0.75},
  "Robust,High":{level:"Very High",weight:1.0}
};
function deriveIPCC(quality,agreement){
  var ev=quality<=0.67?"Limited":quality<=0.83?"Medium":"Robust";
  var ag=agreement<=0.25?"Low":agreement<=0.5?"Medium":"High";
  return IPCC_GRID[ev+","+ag]||{level:"Very Low",weight:0.25};
}
function evLabel(quality){return quality<=0.67?"Limited":quality<=0.83?"Medium":"Robust";}
function agLabel(agreement){return agreement<=0.25?"Low":agreement<=0.5?"Medium":"High";}
function ipccBadge(level){
  var cls={"Very High":"ipcc-very-high","High":"ipcc-high","Medium":"ipcc-medium","Low":"ipcc-low","Very Low":"ipcc-very-low"};
  return '<span class="ipcc-badge '+(cls[level]||"ipcc-very-low")+'">'+level+' confidence</span>';
}
function ipccTableHTML(){
  return '<div style="overflow-x:auto;margin-bottom:16px">'
    +'<p style="font-size:12px;font-weight:600;color:#374151;margin-bottom:6px">IPCC Confidence is derived automatically from Data Quality \u00d7 Agreement:</p>'
    +'<table style="font-size:11px"><tr><th></th><th>Low agreement</th><th>Medium agreement</th><th>High agreement</th></tr>'
    +'<tr><td><b>Robust (Excellent quality)</b></td><td>Medium (0.50)</td><td>High (0.75)</td><td>Very High (1.00)</td></tr>'
    +'<tr><td><b>Medium (Good quality)</b></td><td>Low (0.25)</td><td>Medium (0.50)</td><td>Medium (0.50)</td></tr>'
    +'<tr><td><b>Limited (Poor/Fair quality)</b></td><td>Very Low (0.25)</td><td>Low (0.25)</td><td>Low (0.25)</td></tr>'
    +'</table><p style="font-size:11px;color:#9ca3af;margin-top:4px">Confidence weight (in parentheses) multiplies into the weighted score.</p></div>';
}

function ws(d){
  if(d.state!=="scored") return 0;
  return d.score*deriveIPCC(d.quality,d.agreement).weight*d.quality*d.importance;
}
function lineMax(d){
  if(d.state==="na") return 0;
  return 3*1.0*1.0*d.importance;
}
function domainStats(lines,ds,domainWt){
  var w=lines.reduce(function(s,l){return s+ws(ds[l.id]);},0)*domainWt;
  var absMx=lines.reduce(function(s,l){return s+lineMax(ds[l.id]);},0)*domainWt;
  var scoredLines=lines.filter(function(l){return ds[l.id].state==="scored";});
  var naLines=lines.filter(function(l){return ds[l.id].state==="na";});
  var unassessedLines=lines.filter(function(l){return ds[l.id].state==="unassessed";});
  return {w:w,absMx:absMx,scored:scoredLines.length,na:naLines.length,unassessed:unassessedLines.length,lines:lines,ds:ds};
}

function gate1(){return S.reversible==="yes"?"stop":S.reversible==="uncertain"?"flag":"pass";}
function gate2(){return S.fReduced==="no"?"stop":S.fReduced==="partially"?"flag":"pass";}
function gate4(){
  var p=parseFloat(S.mgmtPrecision),c=parseFloat(S.rpChangeMagnitude);
  if(!p||!c) return "pending"; if(c<p) return "stop"; if(c<p*1.5) return "flag"; return "pass";
}
function gate3flag(){return S.primaryDriver.indexOf("Industry request to maintain or expand fishing access")>=0&&(S.previousCollapse==="yes"||S.previousCollapse==="suspected");}

function badgeHTML(o){
  var m={pass:["badge-pass","\u2713 Pass"],flag:["badge-flag","\u26a0 Flag"],stop:["badge-stop","\u26d4 Stop"],pending:["badge-pending","\u2014 Pending"]};
  var x=m[o]||m.pending; return '<span class="badge '+x[0]+'">'+x[1]+'</span>';
}
function alertHTML(t,h){return '<div class="alert alert-'+t+'">'+h+'</div>';}
function esc(v){return String(v==null?"":v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function escCSV(v){var s=String(v==null?"":v);if(s.indexOf(",")>=0||s.indexOf('"')>=0||s.indexOf("\n")>=0)return'"'+s.replace(/"/g,'""')+'"';return s;}
function rowCSV(arr){return arr.map(escCSV).join(",");}

function timestamp(){
  var d=new Date();
  var pad=function(n){return n<10?"0"+n:String(n);};
  return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())
    +" "+pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());
}

var QUAL_LEVELS=[0.5,0.67,0.83,1.0];
var AG_LEVELS=[0.25,0.5,1.0];
var IMP_LEVELS=[0.25,0.5,0.75,1.0];

function shiftedScore(lines,ds,field,dir,domainWt){
  return lines.reduce(function(s,l){
    var d=ds[l.id];
    if(d.state!=="scored") return s;
    var arr=field==="quality"?QUAL_LEVELS:field==="agreement"?AG_LEVELS:IMP_LEVELS;
    var idx=arr.indexOf(d[field]);
    var ni=Math.max(0,Math.min(arr.length-1,idx+dir));
    var nv=arr[ni];
    var qu=field==="quality"?nv:d.quality;
    var ag=field==="agreement"?nv:d.agreement;
    var im=field==="importance"?nv:d.importance;
    return s+d.score*deriveIPCC(qu,ag).weight*qu*im;
  },0)*domainWt;
}
function allDomainScore(field,dir){
  return shiftedScore(DOMAIN_A,S.domainA,field,dir,S.wtA)
       + shiftedScore(DOMAIN_B,S.domainB,field,dir,S.wtB)
       + shiftedScore(DOMAIN_C,S.ikfk,field,dir,S.wtC);
}
function shiftedMax(lines,ds,field,dir,domainWt){
  return lines.reduce(function(s,l){
    var d=ds[l.id];
    if(d.state==="na") return s;
    if(field==="importance"){
      var arr=IMP_LEVELS;
      var idx=arr.indexOf(d.importance);
      var ni=Math.max(0,Math.min(arr.length-1,idx+dir));
      return s+3*1.0*1.0*arr[ni];
    }
    return s+3*1.0*1.0*d.importance;
  },0)*domainWt;
}
function allDomainMax(field,dir){
  return shiftedMax(DOMAIN_A,S.domainA,field,dir,S.wtA)
       + shiftedMax(DOMAIN_B,S.domainB,field,dir,S.wtB)
       + shiftedMax(DOMAIN_C,S.ikfk,field,dir,S.wtC);
}

function getValence(line,direction){if(!line.valence) return "neutral"; return line.valence[direction]||"neutral";}
function valenceBadgeHTML(v){
  if(v==="good") return '<span class="valence-good">\u2713 Good for stock</span>';
  if(v==="bad")  return '<span class="valence-bad">\u2717 Bad for stock</span>';
  return '<span class="valence-neutral">\u25c8 Context-dep.</span>';
}
function valenceOptionSuffix(line,direction){
  var v=getValence(line,direction);
  if(v==="good") return " [Good]"; if(v==="bad") return " [Bad]"; return " [Context-dep.]";
}

function autoFinding(line,d){
  if(d.state!=="scored"||d.score===0) return null;
  var sw=["","a weak and suggestive","a moderate","a strong"];
  var dw={Decline:"declining",Increase:"increasing",Variable:"variable",Unknown:"changed"};
  var onset=d.onset_year?" since approximately "+d.onset_year:"";
  var ot=d.ongoing==="true"?" and the change is ongoing":d.ongoing==="stabilised"?" and the indicator appears to have stabilised at a new level":" though the change appears to have reversed or resolved";
  var v=getValence(line,d.direction);
  var vc=v==="bad"?" [Negative signal for stock productivity]":v==="good"?" [Positive signal for stock productivity]":" [Direction is context-dependent \u2014 see notes]";
  return line.label+" shows "+(sw[d.score]||"a")+" "+(dw[d.direction]||"changed")+" trend"+onset+ot+"."+vc;
}

  var isIK=domain==="ikfk";

  var lsbCls=d.state==="scored"?"lsb-scored":d.state==="na"?"lsb-na":"lsb-unassessed";
  var lsbTxt=d.state==="scored"?"Assessed":d.state==="na"?"N/A":"Not yet assessed";

    +'<button class="ev-status-btn ev-btn-na'+(d.state==="na"?" active":"")+'" onclick="setLineState(\''+domain+'\',\''+line.id+'\',\'na\')">Not applicable to this stock</button>'

  var fields="";

      +' &nbsp; Evidence: <em>'+evLabel(d.quality)+'</em> | Agreement: <em>'+agLabel(d.agreement)+'</em> | Weight: <strong>'+ipcObj.weight+'</strong></div>';
    var findingSection="";

      var autoF=autoFinding(line,d)||"";
      findingSection='<div class="field span3" style="margin-top:4px">'

        +'<div style="font-size:11px;color:#9ca3af;margin-bottom:4px">Auto: <em>'+esc(autoF)+'</em> '+ipcStr+'</div>'
        +'<textarea rows="2" onchange="updateDomain(\''+domain+'\',\''+line.id+'\',\'finding_text\',this.value)">'+esc(d.finding_text)+'</textarea>'
        +'<button class="btn btn-gray btn-sm" style="margin-top:4px;width:fit-content" onclick="autoFillFinding(\''+domain+'\',\''+line.id+'\')">&#8635; Reset to auto</button></div>';
    }
    var ikField=isIK?'<div class="field"><label>Contradicts scientific evidence?</label>'
      +'<select onchange="updateDomain(\''+domain+'\',\''+line.id+'\',\'contradicts\',this.value)">'
      +'<option value="false"'+(d.contradicts==="false"?" selected":"")+'>No \u2014 consistent</option>'
      +'<option value="true"'+(d.contradicts==="true"?" selected":"")+'>Yes \u2014 contradicts (reconciliation required)</option>'
      +'</select></div>':"";

    fields='<div style="font-size:11px;color:#6b7280;margin-bottom:8px;padding:6px 8px;background:rgba(0,0,0,0.04);border-radius:6px;font-style:italic">'

      +'<div class="field"><label>Evidence Score</label>'
      +'<select onchange="updateDomain(\''+domain+'\',\''+line.id+'\',\'score\',+this.value)">'
      +[0,1,2,3].map(function(i){return '<option value="'+i+'"'+(d.score==i?" selected":"")+'>'+i+' \u2013 '+["Absent / no signal","Weak / suggestive","Moderate","Strong"][i]+'</option>';}).join("")
      +'</select></div>'
      +'<div class="field"><label>Data Quality <small style="color:#9ca3af">(Evidence axis)</small></label>'
      +'<select onchange="updateDomain(\''+domain+'\',\''+line.id+'\',\'quality\',+this.value)">'
      +[[0.5,"Poor \u2014 limited/anecdotal"],[0.67,"Fair \u2014 some data, gaps exist"],[0.83,"Good \u2014 solid but improvable"],[1.0,"Excellent \u2014 comprehensive"]].map(function(x){return '<option value="'+x[0]+'"'+(d.quality==x[0]?" selected":"")+'>'+x[1]+'</option>';}).join("")
      +'</select></div>'
      +'<div class="field"><label>Agreement <small style="color:#9ca3af">(Agreement axis)</small></label>'
      +'<select onchange="updateDomain(\''+domain+'\',\''+line.id+'\',\'agreement\',+this.value)">'
      +[[0.25,"Low \u2014 conflicting or single source"],[0.5,"Medium \u2014 generally consistent"],[1.0,"High \u2014 consistent, multiple independent sources"]].map(function(x){return '<option value="'+x[0]+'"'+(d.agreement==x[0]?" selected":"")+'>'+x[1]+'</option>';}).join("")
      +'</select></div>'
      +'<div class="ev-fields span3" style="grid-column:span 3;margin-top:6px">'+ipccDerived+'</div>'
      +'<div class="field"><label>Importance Weight</label>'
      +'<select onchange="updateDomain(\''+domain+'\',\''+line.id+'\',\'importance\',+this.value)">'
      +[[1.0,"Critical"],[0.75,"High"],[0.5,"Moderate"],[0.25,"Supporting"]].map(function(x){return '<option value="'+x[0]+'"'+(d.importance==x[0]?" selected":"")+'>'+x[1]+'</option>';}).join("")
      +'</select></div>'
      +'<div class="field"><label>Onset Year</label>'
      +'<input type="number" value="'+esc(d.onset_year)+'" placeholder="e.g. 1995" onchange="updateDomain(\''+domain+'\',\''+line.id+'\',\'onset_year\',this.value)"></div>'
      +'<div class="field"><label>Direction of Change</label>'
      +'<select onchange="updateDomain(\''+domain+'\',\''+line.id+'\',\'direction\',this.value)">'+dirOptions+'</select>'

      +'<option value="stabilised"'+(d.ongoing==="stabilised"?" selected":"")+'>Stabilised at a new level</option>'
      +'<option value="false"'+(d.ongoing==="false"?" selected":"")+'>Reversed or resolved</option>'
      +'</select></div>'
      +ikField
      +'<div class="field span2"><label>Notes</label>'
      +'<input type="text" value="'+esc(d.notes)+'" placeholder="Supporting detail, source, caveats..." onchange="updateDomain(\''+domain+'\',\''+line.id+'\',\'notes\',this.value)"></div>'
      +findingSection+'</div>';
  } else if(d.state==="na"){
    fields='<div style="font-size:12px;color:#6b7280;padding:6px 0;font-style:italic">This evidence line has been marked as not applicable to this stock. It is excluded from the scoring denominator.</div>'

function scorePositioningHTML(sA,sB,sIK){
  var obs=sA.w+sB.w+sIK.w;
  var absMax=sA.absMx+sB.absMx+sIK.absMx;
  if(absMax===0) return '<p class="section-note">No lines have been assessed yet. All lines currently score 0 against the full framework maximum.</p>';

  var obsPct=Math.min(100,Math.max(0,(obs/absMax)*100));
  var codPct=REF_CASES.cod.pct, lowPct=REF_CASES.low.pct;

  var totalLines=DOMAIN_A.length+DOMAIN_B.length+DOMAIN_C.length;
  var scoredCount=sA.scored+sB.scored+sIK.scored;
  var naCount=sA.na+sB.na+sIK.na;
  var unassessed=totalLines-scoredCount-naCount;

  var baseTotal=obs;
  var sens=[    ["Quality \u22121",allDomainScore("quality",-1)],
    ["Quality +1",allDomainScore("quality",1)],
    ["Agreement \u22121",allDomainScore("agreement",-1)],
    ["Agreement +1",allDomainScore("agreement",1)],
    ["Importance \u22121",allDomainScore("importance",-1)],
    ["Importance +1",allDomainScore("importance",1)]
  ];
  var sensMin=sens.reduce(function(m,x){return Math.min(m,x[1]);},Infinity);
  var sensMax=sens.reduce(function(m,x){return Math.max(m,x[1]);}, -Infinity);
  var smnP=Math.min(100,Math.max(0,(sensMin/absMax)*100));
  var smxP=Math.min(100,Math.max(0,(sensMax/absMax)*100));

  var verdict, vCls;
  if(unassessed>3){
    vCls="verdict-weak";
    verdict={title:"\u26a0 Assessment incomplete \u2014 "+unassessed+" line(s) not yet assessed",
      body:"The current score ("+obsPct.toFixed(0)+"% of the full framework maximum) may increase substantially as more lines are assessed. All unassessed lines currently score 0 and are included in the denominator. Complete the assessment or mark lines Not Applicable before drawing conclusions."};
  } else if(obsPct>=55){vCls="verdict-strong";verdict={title:"Strong evidence \u2014 supports a reference point revision",body:"The observed score ("+obsPct.toFixed(0)+"% of full framework maximum) is comparable to or exceeds the Northern Cod benchmark (~"+codPct+"%). The evidence base, if corroborated by Gate findings, is sufficient to support a productivity shift conclusion."};
  } else if(obsPct>=35){vCls="verdict-moderate";verdict={title:"Moderate evidence \u2014 some support, further work recommended",body:"The observed score ("+obsPct.toFixed(0)+"%) sits between the weak-evidence benchmark (~"+lowPct+"%) and the Northern Cod benchmark (~"+codPct+"%). There is a discernible signal but it is not comprehensive."};
  } else if(obsPct>=20){vCls="verdict-weak";verdict={title:"Weak evidence \u2014 insufficient to support revision at this time",body:"The observed score ("+obsPct.toFixed(0)+"%) is only marginally above the weak-evidence benchmark (~"+lowPct+"%). Too sparse or uncertain to support a reference point revision."};
  } else {vCls="verdict-insufficient";verdict={title:"Insufficient evidence \u2014 revision not currently supportable",body:"The observed score ("+obsPct.toFixed(0)+"%) is at or below the weak-evidence benchmark (~"+lowPct+"%). Insufficient evidence to conclude a productivity shift has occurred."};}

  var progressNote='<div style="font-size:12px;color:#6b7280;margin-bottom:10px;padding:8px 10px;background:#f9fafb;border-radius:6px;border:1px solid #e5e7eb">'

    +'</div>';

  var barH='<div class="refcase-panel">'
    +'<div class="refcase-title">Score positioning relative to reference cases</div>'
    +'<p style="font-size:12px;color:#374151;margin-bottom:10px">Score as percentage of the <strong>full framework maximum</strong> (all non-N/A lines at Score=3, Excellent quality, High agreement). This fixed denominator makes scores comparable across stocks and assessments regardless of how many lines were scored.</p>'
    +progressNote
    +'<div style="position:relative;height:70px;margin:30px 0 20px">'
    +'<div style="position:absolute;top:30px;left:0;right:0;height:14px;background:#e5e7eb;border-radius:7px"></div>'
    +'<div style="position:absolute;top:30px;left:'+smnP+'%;width:'+Math.max(0,smxP-smnP)+'%;height:14px;background:#bfdbfe;border-radius:7px;border:1px solid #93c5fd"></div>'
    +'<div style="position:absolute;top:30px;left:0;width:'+obsPct+'%;height:14px;border-radius:7px;background:#3b82f6"></div>'
    +'<div style="position:absolute;left:'+codPct+'%;top:0;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center">'
    +'<span style="font-size:10px;font-weight:700;background:#dc2626;color:white;padding:1px 5px;border-radius:3px;white-space:nowrap">N.Cod ~'+codPct+'%</span>'
    +'<div style="width:2px;height:32px;background:#dc2626;margin-top:1px"></div></div>'
    +'<div style="position:absolute;left:'+lowPct+'%;top:0;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center">'
    +'<span style="font-size:10px;font-weight:700;background:#6b7280;color:white;padding:1px 5px;border-radius:3px;white-space:nowrap">Weak ~'+lowPct+'%</span>'
    +'<div style="width:2px;height:32px;background:#6b7280;margin-top:1px"></div></div>'
    +'<div style="position:absolute;left:'+obsPct+'%;top:44px;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center">'
    +'<div style="width:2px;height:16px;background:#1d4ed8"></div>'
    +'<span style="font-size:10px;font-weight:700;background:#1d4ed8;color:white;padding:1px 5px;border-radius:3px;white-space:nowrap;margin-top:1px">Your stock '+obsPct.toFixed(0)+'%</span>'
    +'</div></div>'
    +'<div style="display:flex;justify-content:space-between;font-size:10px;color:#9ca3af;margin-top:4px">'
    +'<span>0% \u2014 No evidence</span><span>50%</span><span>100% \u2014 Full framework maximum</span></div>'
    +'<div style="font-size:11px;color:#6b7280;margin-top:8px;display:flex;gap:14px;flex-wrap:wrap">'
    +'<span><span style="display:inline-block;width:14px;height:8px;background:#bfdbfe;border:1px solid #93c5fd;border-radius:2px;margin-right:3px"></span>Sensitivity range (\u00b11 level shift)</span>'
    +'<span><span style="display:inline-block;width:14px;height:8px;background:#3b82f6;border-radius:2px;margin-right:3px"></span>Observed score</span></div>'
    +'<div class="refcase-cases">'
    +'<div class="refcase-case refcase-case-cod"><div class="refcase-case-title">\ud83d\udccd '+REF_CASES.cod.label+'</div><div class="refcase-case-body">'+REF_CASES.cod.description+'</div></div>'
    +'<div class="refcase-case refcase-case-low"><div class="refcase-case-title">\ud83d\udccd '+REF_CASES.low.label+'</div><div class="refcase-case-body">'+REF_CASES.low.description+'</div></div>'
    +'</div></div>';

  var vH='<div class="verdict-panel '+vCls+'"><div class="verdict-title">'+verdict.title+'</div><div class="verdict-body">'+verdict.body+'</div></div>';

  var sensRows=sens.map(function(x){
    var mx2=x[0].indexOf("Importance")>=0?allDomainMax(x[0].indexOf("\u22121")>=0?"importance":"importance",x[0].indexOf("\u22121")>=0?-1:1):absMax;
    var denom=mx2>0?mx2:absMax;
    var delta=x[1]-baseTotal;
    var pct2=baseTotal>0?(delta/baseTotal)*100:0;
    var cls2=delta>=0?"td-pos":"td-neg"; var sign=delta>=0?"+":"";
    return '<div class="sens-row"><span style="color:#374151">'+x[0]+'</span>'
      +'<span style="font-family:monospace">'+x[1].toFixed(2)+' ('+(absMax>0?((x[1]/absMax)*100).toFixed(0):0)+'% of max)</span>'
      +'<span class="'+cls2+'" style="font-family:monospace;width:90px;text-align:right">'+sign+delta.toFixed(2)+' ('+sign+pct2.toFixed(0)+'%)</span></div>';

  var sensH='<div class="sensitivity-summary" style="margin-top:16px">'
    +'<p style="font-size:12px;font-weight:600;margin-bottom:6px;color:#374151">Sensitivity analysis \u2014 uniform \u00b11 level shift on all scored lines</p>'
    +'<p style="font-size:11px;color:#6b7280;margin-bottom:8px">Stress test: how the total score changes if every scored line\'s quality, agreement, or importance rating is moved one level simultaneously. Unassessed and N/A lines are unaffected.</p>'
    +sensRows+'</div>';

  return barH+vH+sensH;
}

function overallIPCCLevel(sA,sB,sIK){
  var total=sA.w+sB.w+sIK.w, absMax=sA.absMx+sB.absMx+sIK.absMx;
  if(absMax===0) return {level:"Very Low",evidence:"Limited",agreement:"Low"};
  var pct=(total/absMax)*100;
  var evLevel=pct<20?"Limited":pct<50?"Medium":"Robust";
  var allLines=DOMAIN_A.concat(DOMAIN_B).concat(DOMAIN_C);
  var scored=allLines.filter(function(l){var ds=(l.id in S.domainA)?S.domainA:(l.id in S.domainB)?S.domainB:S.ikfk; return ds[l.id].state==="scored";});
  var sigLines=scored.filter(function(l){var ds=(l.id in S.domainA)?S.domainA:(l.id in S.domainB)?S.domainB:S.ikfk; return ds[l.id].score>1;});
  var agFrac=scored.length>0?sigLines.length/scored.length:0;
  var agLevel=agFrac<0.33?"Low":agFrac<0.67?"Medium":"High";
  var grid={"Limited,Low":"Very Low","Limited,Medium":"Low","Limited,High":"Low","Medium,Low":"Low","Medium,Medium":"Medium","Medium,High":"Medium","Robust,Low":"Medium","Robust,Medium":"High","Robust,High":"Very High"};
  return {level:grid[evLevel+","+agLevel]||"Low",evidence:evLevel,agreement:agLevel};
}

function gateFindingHTML(g1,g2,g4){
  var prevFlag=S.previousCollapse==="yes"||S.previousCollapse==="suspected";
  var lhFlag=S.lifeHistoryChanges==="yes"||S.lifeHistoryChanges==="suspected";
  var fDur=parseFloat(S.fReductionDuration)||null, genT=parseFloat(S.generationTime)||null;
  var g1text=S.reversible==="yes"?"The observed stock change is assessed as plausibly reversible through reduction of fishing mortality or changes to fishing selectivity."
    :S.reversible==="uncertain"?"The extent to which the observed stock change is attributable to fishing versus environmental or biological drivers could not be clearly determined."
    :"The observed stock change is assessed as not plausibly reversible through management action alone.";
  var lhText=lhFlag?'<br><br><strong>Changes in life history have occurred:</strong> Persistent changes in growth, maturity, or productivity parameters have been documented or are suspected for this stock. Such life history changes shift biological reference points regardless of fishing pressure and represent a primary justification for reference point revision.'+(S.lifeHistoryNotes?' Notes: '+esc(S.lifeHistoryNotes):''):'';
  var collapseText=prevFlag?'<br><br><strong>History of severe overexploitation:</strong> This stock has a documented or suspected history of collapse or severe overexploitation. The evaluation should carefully distinguish between productivity changes caused by historical fishing (potentially reversible) and changes caused by environmental or ecosystem drivers (requiring reference point revision). See Duplisea et al. and Hutchings &amp; Reynolds (2004).':'';
  var g2text=S.fReduced==="no"?"Fishing mortality has not been meaningfully reduced. The stock has not been given an opportunity to demonstrate a recovery response."
    :S.fReduced==="partially"?"Fishing mortality was reduced but not to a level or for a duration sufficient to produce an expected recovery response."+(fDur&&genT?" Maintained approximately "+fDur+" years against generation time of "+genT+" years.":"")
    :"Fishing mortality was substantially reduced and maintained for approximately "+(fDur||"an undocumented")+" year(s)."+(fDur&&genT?" This "+(fDur>=genT?"meets":"does not meet")+" the criterion of one mean generation time ("+genT+" years).":"")+" No recovery in stock biomass was observed.";
  var g4prec=parseFloat(S.mgmtPrecision)||null, g4chg=parseFloat(S.rpChangeMagnitude)||null;
  var g4text=(!g4prec||!g4chg)?"Management system precision and contemplated reference point change magnitude were not specified."
    :g4==="stop"?"The contemplated reference point change ("+g4chg+" units) is smaller than the precision of current management measures (\u00b1"+g4prec+" units). A revision would not result in a meaningfully different management outcome."
    :g4==="flag"?"The contemplated reference point change ("+g4chg+" units) is only marginally larger than current management precision (\u00b1"+g4prec+" units). The practical effect may be limited."
    :"The contemplated reference point change ("+g4chg+" units) is substantially larger than current management precision (\u00b1"+g4prec+" units). The management system is capable of acting on a revision of this magnitude.";
  var bc1=g1==="stop"?"#fca5a5":g1==="flag"?"#fcd34d":"#86efac";
  var bc2=g2==="stop"?"#fca5a5":g2==="flag"?"#fcd34d":"#86efac";
  var bc4=g4==="stop"?"#fca5a5":g4==="flag"?"#fcd34d":g4==="pending"?"#d1d5db":"#86efac";
  return '<div class="finding-block" style="border-color:'+bc1+'">'
    +'<div class="finding-label">Gate 1 \u2014 Reversibility &amp; Life History</div>'
    +'<div class="finding-auto">'+g1text+lhText+collapseText+'</div></div>'
    +'<div class="finding-block" style="border-color:'+bc2+'">'
    +'<div class="finding-label">Gate 2 \u2014 F Reduction Test</div>'
    +'<div class="finding-auto">'+g2text+'</div>'
    +(S.fReductionNotes?'<div style="font-size:11px;color:#9ca3af;margin-top:4px">Notes: '+esc(S.fReductionNotes)+'</div>':"")
    +'</div>'
    +'<div class="finding-block" style="border-color:'+bc4+'">'
    +'<div class="finding-label">Gate 4 \u2014 Management System Capability</div>'
    +'<div class="finding-auto">'+g4text+'</div>'
    +(S.hcrExists==="no"?'<div style="font-size:11px;color:#9ca3af;margin-top:4px">No harvest control rule is in place. Management response would require ad hoc decision-making.</div>':"")
    +'</div>';
}

function evidenceGapsHTML(){
  var sets=[
    {title:"Domain A \u2014 Internal Stock Signal",lines:DOMAIN_A,ds:S.domainA},
    {title:"Domain B \u2014 Ecosystem &amp; Environmental Signal",lines:DOMAIN_B,ds:S.domainB},
    {title:"Domain C \u2014 IK &amp; FK",lines:DOMAIN_C,ds:S.ikfk}
  ];
  var anyGap=false, html="";
  sets.forEach(function(obj){
    html+='<div class="gap-domain-section"><div class="gap-domain-title">'+obj.title+'</div>';
    var unassessed=obj.lines.filter(function(l){return obj.ds[l.id].state==="unassessed";});
    var naLines=obj.lines.filter(function(l){return obj.ds[l.id].state==="na";});
    var weak=obj.lines.filter(function(l){return obj.ds[l.id].state==="scored"&&obj.ds[l.id].score<=1&&obj.ds[l.id].agreement<=0.25;});
    if(!unassessed.length&&!weak.length){
      html+='<div class="gap-assessed">\u2713 All lines assessed or marked N/A.</div>';
    }
    unassessed.forEach(function(l){anyGap=true; var isCrit=l.imp===1.0;
      html+='<div class="gap-item '+(isCrit?"gap-item-critical":"gap-item-normal")+'">'
        +'<span>'+(isCrit?"\u26d4":"\u25fb")+'</span>'
        +'<span><strong>'+esc(l.label)+'</strong>'+(isCrit?' <em style="font-size:10px">(Critical \u2014 imp=1.0)</em>':"")
        +' \u2014 not yet assessed (scores 0 against full denominator)</span></div>';
    });
    naLines.forEach(function(l){
      html+='<div class="gap-item gap-item-na"><span>\u2014</span>'
        +'<span>'+esc(l.label)+' \u2014 marked N/A'+(obj.ds[l.id].notes?' ('+esc(obj.ds[l.id].notes)+')':'')+'</span></div>';
    });
    weak.forEach(function(l){anyGap=true;
      html+='<div class="gap-item gap-item-normal"><span>\u26a0</span>'
        +'<span><strong>'+esc(l.label)+'</strong> \u2014 weak signal (score '+obj.ds[l.id].score+') with low agreement</span></div>';
    });
    html+='</div>';
  });
  if(!anyGap) html='<p class="section-note">All evidence lines have been assessed or marked N/A, with no critical gaps.</p>'+html;
  return html;
}

function timelineSVG(){
  var items=[];
  [{lines:DOMAIN_A,ds:S.domainA,domainColor:"#3b82f6",lbl:"A"},   {lines:DOMAIN_B,ds:S.domainB,domainColor:"#22c55e",lbl:"B"},   {lines:DOMAIN_C,ds:S.ikfk,domainColor:"#a855f7",lbl:"IK/FK"}].forEach(function(obj){
    obj.lines.forEach(function(line){
      var d=obj.ds[line.id];
      if(d.state==="scored"&&d.score>0&&d.onset_year){
        items.push({label:line.label.length>42?line.label.slice(0,42)+"\u2026":line.label,
          onset:parseInt(d.onset_year),ongoing:d.ongoing,
          domainColor:obj.domainColor,domain:obj.lbl,score:d.score});
      }
    });
  });
  if(!items.length) return '<p class="section-note">No scored lines with onset years entered yet.</p>';
  var genTime=parseFloat(S.generationTime)||10, cur=2025;
  var minY=Math.min.apply(null,items.map(function(i){return i.onset;}))-2;
  var maxY=cur+2, span=maxY-minY;
  var lw=230,cr=370,cw=lw+cr+10,rh=28, th=items.length*rh+60;
  var xs=function(yr){return ((yr-minY)/span)*cr;};
  var glx=xs(cur-genTime);
  var BAR_COLOR="#64748b";
  var svg='<svg width="'+cw+'" height="'+th+'" style="max-width:100%">'
    +'<rect width="'+cw+'" height="'+th+'" fill="transparent"/>'
    +'<rect x="'+(lw+glx)+'" y="0" width="'+(cr-glx)+'" height="'+(items.length*rh+40)+'" fill="rgba(59,130,246,0.07)"/>'
    +'<line x1="'+(lw+glx)+'" y1="0" x2="'+(lw+glx)+'" y2="'+(items.length*rh+40)+'" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3"/>'
    +'<text x="'+(lw+glx+3)+'" y="11" font-size="9" fill="#3b82f6">\u2190 1 gen</text>'
    +'<line x1="'+(lw+xs(cur))+'" y1="0" x2="'+(lw+xs(cur))+'" y2="'+(items.length*rh+40)+'" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2"/>'
    +'<text x="'+(lw+xs(cur)+3)+'" y="11" font-size="9" fill="#ef4444">Now</text>';
  [minY,Math.round((minY+maxY)/2),maxY].forEach(function(yr){
    svg+='<text x="'+(lw+xs(yr))+'" y="'+(th-8)+'" font-size="10" text-anchor="middle" fill="#6b7280">'+yr+'</text>';
  });
  items.forEach(function(item,i){
    var y=i*rh+16, x1=lw+xs(item.onset);
    var isOng=item.ongoing==="true"||item.ongoing==="stabilised";
    var x2=isOng?lw+xs(cur):Math.min(lw+xs(cur),x1+20);
    svg+='<text x="'+(lw-40)+'" y="'+(y+10)+'" font-size="8" text-anchor="end" fill="'+item.domainColor+'">['+item.domain+']</text>'
      +'<text x="'+(lw-44)+'" y="'+(y+10)+'" font-size="9" text-anchor="end" fill="#374151">'+item.label+'</text>'
      +'<rect x="'+x1+'" y="'+(y+1)+'" width="'+Math.max(x2-x1,6)+'" height="14" fill="'+BAR_COLOR+'" opacity="'+(0.25+item.score*0.22)+'" rx="2"/>'
      +'<rect x="'+x1+'" y="'+(y+1)+'" width="6" height="14" fill="'+BAR_COLOR+'" opacity="0.9" rx="2"/>'
      +(item.ongoing==="true"?'<polygon points="'+x2+','+(y+1)+' '+(x2+7)+','+(y+8)+' '+x2+','+(y+15)+'" fill="'+BAR_COLOR+'" opacity="0.8"/>':"")
      +(item.ongoing==="stabilised"?'<line x1="'+(x2-1)+'" y1="'+(y+1)+'" x2="'+(x2-1)+'" y2="'+(y+15)+'" stroke="'+BAR_COLOR+'" stroke-width="2" stroke-dasharray="2,2"/>':"");
  });
  svg+='<line x1="'+lw+'" y1="'+(items.length*rh+40)+'" x2="'+(lw+cr)+'" y2="'+(items.length*rh+40)+'" stroke="#9ca3af" stroke-width="1"/></svg>'
    +'<div style="display:flex;gap:14px;font-size:11px;color:#6b7280;margin-top:8px;flex-wrap:wrap">'
    +'<span><span style="display:inline-block;width:12px;height:8px;border-radius:2px;background:#64748b;margin-right:4px"></span>Evidence line (opacity = score strength)</span>'
    +'<span>\u25b6 Arrow = ongoing &nbsp; \u254e Dashed end = stabilised at new level</span>'
    +'<span style="color:#3b82f6">\u258c Shaded = within 1 generation time of present</span></div>'
    +'<div style="font-size:11px;color:#6b7280;margin-top:4px">'
    +'<span style="color:#3b82f6">[A]</span> Domain A &nbsp; <span style="color:#22c55e">[B]</span> Domain B &nbsp; <span style="color:#a855f7">[IK/FK]</span> Domain C</div>';
  return svg;
}

function summaryTableHTML(lines,ds,tcls){
  var scored=lines.filter(function(l){return ds[l.id].state==="scored";});
  var na=lines.filter(function(l){return ds[l.id].state==="na";});
  var unassessed=lines.filter(function(l){return ds[l.id].state==="unassessed";});
  var rows="";
  scored.forEach(function(l){
    var d=ds[l.id]; var ipc=deriveIPCC(d.quality,d.agreement);
    var w=(d.score*ipc.weight*d.quality*d.importance).toFixed(3);
    var vb=d.score>0?valenceBadgeHTML(getValence(l,d.direction)):"\u2014";
    var st=d.ongoing==="true"?"Ongoing":d.ongoing==="stabilised"?"Stabilised":"Resolved";
    rows+='<tr><td>'+esc(l.label)+'</td><td>Scored</td><td>'+d.score+'</td><td>'+evLabel(d.quality)+'</td><td>'+agLabel(d.agreement)+'</td><td>'+ipc.level+'</td><td>'+d.importance+'</td>'
      +'<td class="'+tcls+'">'+w+'</td><td>'+vb+'</td><td>'+st+'</td><td>'+(d.onset_year||"\u2014")+'</td></tr>';
  });
  na.forEach(function(l){
    rows+='<tr style="opacity:0.5"><td>'+esc(l.label)+'</td><td>N/A</td><td colspan="9" style="color:#9ca3af;font-style:italic">'+(ds[l.id].notes||"Not applicable to this stock")+'</td></tr>';
  });
  unassessed.forEach(function(l){
    rows+='<tr style="opacity:0.4"><td>'+esc(l.label)+'</td><td style="color:#92400e">Not assessed</td><td colspan="9" style="color:#9ca3af;font-style:italic">Scores 0 in numerator; included in denominator</td></tr>';
  });
  if(!rows) return '<p class="section-note">No lines in this domain.</p>';
  return '<div style="overflow-x:auto"><table>'
    +'<tr><th>Evidence Line</th><th>Status</th><th>Score</th><th>Evidence</th><th>Agreement</th><th>IPCC Conf.</th><th>Imp.</th><th>Weighted</th><th>Valence</th><th>Status</th><th>Onset</th></tr>'
    +rows+'</table></div>';
}

function formulaBoxHTML(){
  return '<div class="formula-box">'
    // --- Line score ---
    +'<div class="formula-section">'
    +'<div class="formula-section-title">Weighted score per evidence line</div>'
    +'<div class="formula-eq">'
    +'<span class="formula-lhs">W<sub style="font-size:10px">line</sub></span>'
    +'<span class="formula-eq-sign">=</span>'
    +'<span class="formula-prod"><span style="color:#fbbf24">S</span><span class="formula-times">&times;</span><span style="color:#a78bfa">C</span><span class="formula-times">&times;</span><span style="color:#6ee7b7">Q</span><span class="formula-times">&times;</span><span style="color:#f9a8d4">I</span></span>'
    +'</div>'
    +'<hr class="formula-divider">'
    +'<table class="formula-table">'
    +'<tr><td style="color:#fbbf24">S &nbsp;Evidence score</td><td>0 &mdash; absent &nbsp;&bull;&nbsp; 1 &mdash; weak &nbsp;&bull;&nbsp; 2 &mdash; moderate &nbsp;&bull;&nbsp; 3 &mdash; strong</td></tr>'
    +'<tr><td style="color:#a78bfa">C &nbsp;Confidence weight</td><td>Derived from IPCC grid: Data Quality &times; Agreement &nbsp;&rarr;&nbsp; 0.25 / 0.50 / 0.75 / 1.00</td></tr>'
    +'<tr><td style="color:#6ee7b7">Q &nbsp;Data quality weight</td><td>Poor = 0.50 &nbsp;&bull;&nbsp; Fair = 0.67 &nbsp;&bull;&nbsp; Good = 0.83 &nbsp;&bull;&nbsp; Excellent = 1.00</td></tr>'
    +'<tr><td style="color:#f9a8d4">I &nbsp;Importance weight</td><td>Supporting = 0.25 &nbsp;&bull;&nbsp; Moderate = 0.50 &nbsp;&bull;&nbsp; High = 0.75 &nbsp;&bull;&nbsp; Critical = 1.00</td></tr>'
    +'</table>'
    +'</div>'
    // --- Total and max ---
    +'<div class="formula-section">'
    +'<div class="formula-section-title">Total score &amp; maximum</div>'
    +'<div class="formula-eq" style="margin-bottom:8px">'
    +'<span class="formula-lhs">Total</span>'
    +'<span class="formula-eq-sign">=</span>'
    +'<span style="color:#e2e8f0">&Sigma; W<sub style="font-size:10px">line</sub> &times; DomainWeight &nbsp;&nbsp;[scored lines only]</span>'
    +'</div>'
    +'<div class="formula-eq">'
    +'<span class="formula-lhs">Maximum</span>'
    +'<span class="formula-eq-sign">=</span>'
    +'<span style="color:#e2e8f0">&Sigma; (3 &times; 1.00 &times; 1.00 &times; I &times; DomainWeight) &nbsp;&nbsp;[all non-N/A lines]</span>'
    +'</div>'
    +'</div>'
    // --- Percentage ---
    +'<div class="formula-section">'
    +'<div class="formula-section-title">Score percentage</div>'
    +'<div class="formula-eq">'
    +'<span class="formula-lhs">Score %</span>'
    +'<span class="formula-eq-sign">=</span>'
    +'<span class="formula-pct-box">'
    +'<span class="formula-fraction">'
    +'<span class="formula-fraction-num">Total score</span>'
    +'<span class="formula-fraction-den">Maximum score</span>'
    +'</span>'
    +'<span class="formula-x100">&times; 100</span>'
    +'</span>'
    +'</div>'
    +'</div>'
    +'</div>';
}

    +'<p style="font-size:13px;line-height:1.7;color:#374151;margin-bottom:10px">This tool operationalises the weight-of-evidence framework of <strong>Klaer et al. (2015)</strong>. The tool is not a decision rule; all scores reflect professional judgment of the assessment team.</p>'

  lines.push(rowCSV(["DOMAIN_WEIGHT_B",S.wtB]));
  lines.push(rowCSV(["DOMAIN_WEIGHT_C",S.wtC]));
  lines.push("");
  lines.push(rowCSV(["domain","id","label","subdomain","line_state","score","data_quality","agreement","ipcc_confidence_level","ipcc_confidence_weight","importance","line_max","weighted_score","onset_year","direction","valence","ongoing_status","contradicts_scientific","notes","finding_text"]));
  [{key:"A",dl:DOMAIN_A,ds:S.domainA,wt:S.wtA},{key:"B",dl:DOMAIN_B,ds:S.domainB,wt:S.wtB},{key:"IKFK",dl:DOMAIN_C,ds:S.ikfk,wt:S.wtC}].forEach(function(obj){
    obj.dl.forEach(function(line){
      var d=obj.ds[line.id];
      var ipc=deriveIPCC(d.quality,d.agreement);
      var w=(d.state==="scored")?(d.score*ipc.weight*d.quality*d.importance*obj.wt).toFixed(4):"0";
      var lm=(d.state==="na")?"0":(3*1.0*1.0*d.importance*obj.wt).toFixed(4);
      var vi=getValence(line,d.direction);
      lines.push(rowCSV([obj.key,line.id,line.label,line.sub,d.state,
        d.state==="scored"?d.score:"",d.quality,d.agreement,ipc.level,ipc.weight,d.importance,lm,w,

  lines.push("");

  lines.push(rowCSV(["GATE2_f_reduction_notes",S.fReductionNotes]));
  lines.push(rowCSV(["GATE4_mgmt_precision",S.mgmtPrecision]));
  lines.push(rowCSV(["GATE4_rp_change_magnitude",S.rpChangeMagnitude]));
  lines.push(rowCSV(["GATE4_hcr_exists",S.hcrExists]));
  lines.push(rowCSV(["SYNTHESIS_domain_a",S.domainASynthesis]));

  lines.push(rowCSV(["SYNTHESIS_overall",S.overallSynthesis]));

function triggerImport(){document.getElementById("importMsg").textContent="";document.getElementById("importFile").click();}

function parseCSVText(text){
  var rows=[]; var ls=text.split("\n");
  for(var i=0;i<ls.length;i++){
    if(!ls[i].trim()) continue;
    var cols=[],cur="",inQ=false;
    for(var j=0;j<ls[i].length;j++){
      var ch=ls[i][j];
      if(ch==='"'){if(inQ&&ls[i][j+1]==='"'){cur+='"';j++;}else inQ=!inQ;}
      else if(ch===","&&!inQ){cols.push(cur);cur="";}
      else cur+=ch;
    }
    cols.push(cur); rows.push(cols);
  }
  return rows;
}

document.addEventListener("DOMContentLoaded",function(){
  document.getElementById("importBtn").addEventListener("click",triggerImport);
  document.getElementById("exportBtn").addEventListener("click",exportCSV);
  document.getElementById("importFile").addEventListener("change",function(e){
    var file=e.target.files[0]; if(!file) return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var rows=parseCSVText(ev.target.result);
        var kv={},evRows=[],inEv=false,evHdrs=[];
        rows.forEach(function(row){
          if(!row[0]) return;
          var k=row[0].trim();
          if(k==="domain"){inEv=true;evHdrs=row.map(function(h){return h.trim();});return;}
          if(inEv&&["A","B","IKFK"].indexOf(row[0])>=0){
            var obj={};evHdrs.forEach(function(h,i){obj[h]=(row[i]||"").trim();});evRows.push(obj);return;
          }
          if(row.length>=2) kv[k]=row.slice(1).join(",").trim();
        });
        resetDomains();
        evRows.forEach(function(ev){
          var target=ev.domain==="A"?S.domainA:ev.domain==="B"?S.domainB:S.ikfk;
          if(target[ev.id]!==undefined){
            var st=ev.line_state||"unassessed";
            if(ev.applicable==="TRUE"||ev.applicable==="scored") st="scored";
            target[ev.id]={state:st,
              score:Number(ev.score)||0,
              quality:Number(ev.data_quality||ev.quality)||0.83,
              agreement:Number(ev.agreement)||1.0,
              importance:Number(ev.importance)||0.5,
              onset_year:ev.onset_year||"",direction:ev.direction||"Decline",
              ongoing:ev.ongoing_status||ev.ongoing||"true",
              contradicts:ev.contradicts_scientific||"false",
              notes:ev.notes||"",finding_text:ev.finding_text||""};
